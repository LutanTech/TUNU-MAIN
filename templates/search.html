{% extends "base.html" %}

{% block content %}
<div class="container" style="padding: 40px 0;">
    <h2 style="border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 30px;">
        Search results for "{{ query }}"
    </h2>

    {% if results %}
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px;">
        {% for book in results %}
        <div style="background: white; border: 1px solid #eee; border-radius: 8px; padding: 20px; text-align: center;">
            <img src="{{ book.url }}" style="width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px;">
            <h3>{{ book.title }}</h3>
            <p>{{ book.grade }}</p>
            <p style="color: var(--orangered); font-weight: bold;">KSh {{ book.newPrice }}</p>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div style="text-align: center; padding: 60px 0;">
        <i class="fas fa-search-minus" style="font-size: 48px; color: #ccc; margin-bottom: 20px;"></i>
        <h3>No books found matching your search.</h3>
        <a href="{{ url_for('home') }}" style="color: var(--magenta); text-decoration: none; font-weight: bold;">Return Home</a>
    </div>
    {% endif %}
</div>
{% endblock %}
